services:
  db:
    image: postgres:15-alpine
    container_name: budgetflow-postgres
    restart: always
    environment:
      POSTGRES_USER: budgetflow_user
      POSTGRES_PASSWORD: budgetflow_password
      POSTGRES_DB: budgetflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetflow_user -d budgetflow_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: budgetflow-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: budgetflow-backend
    restart: always
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    container_name: budgetflow-worker
    restart: always
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
    working_dir: /app
    command: python -m app.worker.worker
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
