[pytest]
asyncio_mode = auto
pythonpath = .
# One event loop for the whole session so a session-scoped AsyncEngine and all
# function-scoped AsyncSessions share the same asyncio loop (avoids
# InvalidRequestError / asyncpg teardown flakes when a long-lived engine was
# created on a loop that later tests no longer use).
asyncio_default_test_loop_scope = session
asyncio_default_fixture_loop_scope = session
